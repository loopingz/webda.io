on:
  push:
    branches:
      - main
      - maintenance/v3
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
name: release-please
jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          target-branch: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref, 'main') }} # when `manifest-release` creates GitHub Releases per package, create those as "Prerelease" releases that have pre-major or prerelease versions. absence defaults to false and all versions are fully Published.

      - uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        if: ${{ steps.release.outputs.release_created }}

      - name: Checkout repository
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Build
        if: ${{ steps.release.outputs.release_created }}
        run: pnpm install && pnpm run build

      - name: Publish project
        if: ${{ steps.release.outputs.release_created }}
        run: pnpm -r publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install docs dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: cd docs && pnpm install

      - name: Build docs
        if: ${{ steps.release.outputs.release_created }}
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: pnpm run docs

      - name: Deploy docs
        if: ${{ steps.release.outputs.release_created }}
        uses: JamesIves/github-pages-deploy-action@4.1.4
        with:
          branch: gh-pages
          folder: docs/dist
